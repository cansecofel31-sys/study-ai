<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Configuración de Pagos</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#0f172a;

color:white;

}

.sidebar{

position:fixed;

left:0;

top:0;

width:280px;

height:100vh;

background:#172554;

padding:40px 20px;

}

.logo{

font-size:36px;

font-weight:bold;

color:#38bdf8;

margin-bottom:50px;

}

.menu a{

display:block;

padding:18px;

margin-bottom:15px;

border-radius:15px;

text-decoration:none;

color:white;

font-size:24px;

background:#243b7a;

transition:.3s;

}

.menu a:hover{

background:linear-gradient(90deg,#2563eb,#38bdf8);

}

.contenido{

margin-left:300px;

padding:40px;

}

.titulo{

font-size:55px;

font-weight:bold;

margin-bottom:40px;

}

.card{

background:#1e293b;

padding:40px;

border-radius:30px;

box-shadow:0 0 40px rgba(56,189,248,.2);

}

.card h2{

font-size:40px;

margin-bottom:30px;

color:#38bdf8;

}

label{

display:block;

font-size:22px;

margin-bottom:10px;

margin-top:25px;

}

input{

width:100%;

padding:18px;

font-size:20px;

border:none;

border-radius:15px;

background:#334155;

color:white;

}

button{

width:100%;

margin-top:40px;

padding:20px;

font-size:24px;

font-weight:bold;

border:none;

border-radius:20px;

cursor:pointer;

background:linear-gradient(90deg,#2563eb,#38bdf8);

color:white;

transition:.3s;

}

button:hover{

transform:scale(1.02);

box-shadow:0 0 25px #38bdf8;

}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">

Study AI<br>

Admin

</div>

<div class="menu">

<a href="/admin/dashboard">

📊 Dashboard

</a>

<a href="/admin/usuarios">

👥 Usuarios

</a>

<a href="/admin/pagos">

💳 Pagos

</a>

<a href="/admin/configuracion">

⚙ Configuración

</a>

<a href="/">

🌐 Ver sitio

</a>

</div>

</div>

<div class="contenido">

<div class="titulo">

⚙ Configuración Bancaria

</div>

<div class="card">

<h2>

Datos para recibir pagos

</h2>

<form method="POST">

<label>

Banco

</label>

<input

type="text"

name="banco"

value="{{datos[0]}}"

required>


<label>

Titular

</label>

<input

type="text"

name="titular"

value="{{datos[1]}}"

required>


<label>

CLABE

</label>

<input

type="text"

name="Tarjeta Bancaria"

value="{{datos[2]}}"

required>


<label>

WhatsApp

</label>

<input

type="text"

name="whatsapp"

value="{{datos[3]}}"

required>


<label>

Correo

</label>

<input

type="email"

name="correo"

value="{{datos[4]}}"

required>


<button type="submit">

Guardar configuración

</button>

</form>

</div>

</div>

</body>

</html>
